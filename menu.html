<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Akshaya Restaurant — Menu</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold-crayola: hsl(38, 61%, 73%);
      --quick-silver: hsla(0, 0%, 65%, 1);
      --davys-grey: hsla(30, 3%, 34%, 1);
      --smoky-black-1: hsla(40, 12%, 5%, 1);
      --smoky-black-2: hsla(30, 8%, 5%, 1);
      --smoky-black-3: hsla(0, 3%, 7%, 1);
      --eerie-black-1: hsla(210, 4%, 9%, 1);
      --eerie-black-2: hsla(210, 4%, 11%, 1);
      --eerie-black-3: hsla(180, 2%, 8%, 1);
      --eerie-black-4: hsla(0, 0%, 13%, 1);
      --white: hsla(0, 0%, 100%, 1);
      --white-alpha-20: hsla(0, 0%, 100%, 0.2);
      --white-alpha-10: hsla(0, 0%, 100%, 0.1);
      --black: hsla(0, 0%, 0%, 1);
      --black-alpha-80: hsla(0, 0%, 0%, 0.8);
      --black-alpha-15: hsla(0, 0%, 0%, 0.15);

      /* Map old variables to new palette */
      --bg: var(--smoky-black-1);
      --panel: var(--smoky-black-2);
      --card: var(--eerie-black-2);
      --muted: var(--quick-silver);
      --text: var(--white);
      --brand: var(--gold-crayola);
      --brand-2: var(--davys-grey);
      --accent: #28a66f; /* veg */
      --danger: #d9534f; /* non-veg */
      --chip: var(--eerie-black-3);
      --ring: 0 0 0 2px var(--white-alpha-20), 0 10px 30px var(--black-alpha-80);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box }
    html,body{ height:100% }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(1200px 800px at 80% -10%, var(--smoky-black-3) 0%, var(--bg) 60%);
      background-attachment: fixed;
    }

    /* Header */
    .site-header{
      position: sticky; top:0; z-index: 50;
      backdrop-filter: blur(10px);
      background: var(--smoky-black-2);
      border-bottom: 1px solid var(--white-alpha-10);
    }
    .container{ width:min(1200px, 92vw); margin-inline:auto; }
    .header-inner{ display:flex; align-items:center; gap:16px; padding:16px 0; }
    .brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; }
    .brand-logo{
      width:44px; height:44px; border-radius:12px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: inset 0 0 0 1px var(--white-alpha-20), 0 10px 30px var(--black-alpha-80);
    }
    .brand-title{ font-family: "Playfair Display", serif; font-weight:700; letter-spacing:.4px; font-size: clamp(18px, 2.4vw, 24px); }
    .brand-sub{ font-size:12px; color:var(--muted); margin-top:-6px }

    .header-controls{ margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap }
    .search{ position:relative; }
    .search input{
      width:min(320px, 70vw);
      background:var(--panel);
      border:1px solid var(--white-alpha-10);
      color:var(--text);
      padding:12px 38px 12px 14px;
      border-radius:12px;
      outline:none;
    }
    .search svg{ position:absolute; right:10px; top:50%; transform:translateY(-50%); opacity:.7 }

    .toggle{
      display:inline-flex; align-items:center; gap:8px; padding:10px 12px; background:var(--panel);
      border:1px solid var(--white-alpha-10); border-radius:12px; cursor:pointer; user-select:none;
    }
    .toggle input{ display:none }
    .toggle .dot{ width:16px; height:16px; border-radius:999px; background:var(--chip); position:relative; box-shadow: inset 0 0 0 1px var(--white-alpha-10) }
    .toggle input:checked + .dot{ background:var(--accent) }

    /* Hero */
    .hero{ padding:40px 0 8px }
    .hero h1{
      font-family: "Playfair Display", serif; font-weight:700; line-height:1.1;
      font-size:clamp(28px, 5vw, 48px);
      margin:0 0 8px; letter-spacing:.3px;
      text-shadow: 0 1px 0 var(--black-alpha-80);
    }
    .hero p{ color:var(--muted); margin:0 }

    /* Chips */
    .chips{ display:flex; gap:10px; flex-wrap:wrap; padding:18px 0 10px }
    .chip{
      padding:10px 14px; background:var(--chip); border:1px solid var(--white-alpha-10); border-radius:999px; cursor:pointer;
      transition: transform .15s ease, background .2s ease, border-color .15s ease; user-select:none; font-weight:500; font-size:14px
    }
    .chip:hover{ transform: translateY(-2px) }
    .chip.active{ background:linear-gradient(180deg, var(--eerie-black-2), var(--eerie-black-3)); border-color: var(--brand); box-shadow: var(--ring) }

    /* Grid */
    .grid{ display:grid; grid-template-columns: repeat(12, 1fr); gap:16px; padding:14px 0 40px }
    .card{
      grid-column: span 6;
      background: linear-gradient(180deg, var(--eerie-black-2), var(--eerie-black-3));
      border:1px solid var(--white-alpha-10);
      border-radius: var(--radius-xl);
      overflow:hidden;
      position:relative;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .card:hover{ transform: translateY(-4px); box-shadow: 0 20px 60px var(--black-alpha-80); border-color: var(--white-alpha-20) }
    .card-inner{ display:flex; gap:16px; padding:16px }
    .thumb{ width:120px; height:120px; border-radius:16px; background:var(--smoky-black-3); flex:none; overflow:hidden; display:grid; place-items:center; }
    .thumb img{ width:100%; height:100%; object-fit:cover }

    .meta{ flex:1; min-width:0 }
    .title{ font-weight:600; font-size:18px; letter-spacing:.2px; margin:2px 0 8px }
    .desc{ color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 10px; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden }

    .badges{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px }
    .badge{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:var(--eerie-black-4); border:1px solid var(--white-alpha-10); font-size:12px }
    .badge svg{ width:14px; height:14px }
    .veg { color: var(--accent) }
    .nonveg { color: var(--danger) }
    .spice { color: #ff7b00 }

    .price-row{ display:flex; align-items:center; justify-content:space-between; gap:12px }
    .price{ font-family: "Playfair Display", serif; font-size:20px }
    .btn{
      appearance:none; border:none; background: linear-gradient(180deg, var(--eerie-black-2), var(--eerie-black-3));
      border:1px solid var(--white-alpha-20);
      color:var(--text); padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:600;
      transition: transform .15s ease, box-shadow .2s ease;
    }
    .btn:hover{ transform: translateY(-2px); box-shadow: var(--ring) }

    /* Category headings */
    .section-title{ padding: 26px 6px 8px; margin: 0; font-family: "Playfair Display", serif; font-size: clamp(20px, 3vw, 28px); letter-spacing:.3px }
    .section-sub{ color:var(--muted); font-size:13px; margin:0 6px 8px }

    /* Footer */
    footer{ padding:40px 0; color:var(--muted); border-top:1px solid var(--white-alpha-10) }

    /* Responsive */
    @media (max-width: 900px){ .card{ grid-column: span 12 } .thumb{ width:100px; height:100px } }
    @media (max-width: 520px){ .header-inner{ padding:12px 0 } .brand-title{ font-size:20px } .search input{ width:68vw } }
  </style>
</head>
<body>
  <!-- The rest of the HTML remains unchanged -->
</body>
</html>
